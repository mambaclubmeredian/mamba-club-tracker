<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mamba Club Progress Tracker</title>
<style>
body {
    background: #0b0b0b;
    color: white;
    font-family: Arial;
    margin: 0;
}

header {
    background: black;
    color: gold;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    letter-spacing: 2px;
}

#search {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border: none;
    outline: none;
}

.card {
    background: #111;
    margin: 10px;
    padding: 15px;
    border-left: 4px solid gold;
}

.gold {
    color: gold;
}

</style>
</head>
<body>

<header>Mamba Club Progress Tracker</header>

<input id="search" placeholder="Search character..." onkeyup="filter()">

<div id="list"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFYYqQZ2iHw-U5tffIJDYOwSSdOdFgLsI1Voh_hRSId8OJ9Vkis2aY5UV-GOkDve67Q3AiStzsmbr3/pub?output=csv";

let data = [];

fetch(SHEET_URL)
.then(res => res.text())
.then(text => {
    let rows = text.split("\n").slice(1);

    data = rows.map(r => {
        let cols = r.split(",");
        return {
            name: cols[0],
            faction: cols[1],
            points: parseInt(cols[2]) || 0,
            gotm: cols[3]
        };
    });

    render(data);
});

function render(list) {
    const container = document.getElementById("list");
    container.innerHTML = "";

    list.forEach(p => {
        container.innerHTML += `
        <div class="card">
            <div class="gold">${p.name}</div>
            <div>Faction: ${p.faction}</div>
            <div>Points: ${p.points}</div>
            <div>GOTM Awards: ${p.gotm}</div>
        </div>`;
    });
}

function filter() {
    let val = document.getElementById("search").value.toLowerCase();
    let filtered = data.filter(p => p.name.toLowerCase().includes(val));
    render(filtered);
}

</script>

</body>
</html>
