<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamba Club Progress Tracker V3.1</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#050505,#111);color:#fff}
header{text-align:center;padding:40px 20px;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);border-bottom:1px solid rgba(212,175,55,.4)}
h1{margin:0;color:#d4af37;letter-spacing:3px}
.subtitle{color:#ccc}
#stats{max-width:1200px;margin:20px auto;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.stat-card,.panel,.card{background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(212,175,55,.35);border-radius:16px;box-shadow:0 8px 25px rgba(0,0,0,.35)}
.stat-card{padding:15px;text-align:center}
.stat-number{font-size:2rem;font-weight:bold;color:#d4af37}
.panel{max-width:1200px;margin:20px auto;padding:20px}
.search-container{max-width:1200px;margin:auto;padding:0 20px 20px}
#search{width:100%;padding:15px;border-radius:12px;border:1px solid #d4af37;background:#111;color:white}
#players{max-width:1200px;margin:auto;padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.card{padding:20px}
.name{font-size:1.4rem;font-weight:bold;color:#d4af37;margin-bottom:10px}
.label{color:#d4af37;font-weight:bold}
.winter{color:#8fd8ff}.ebony{color:#f0d7a1}
.progress-bar{height:12px;background:#222;border-radius:999px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#d4af37,#ffe08a)}
.max-rank{color:#7CFC00;font-weight:bold;margin-top:10px}
footer{text-align:center;padding:20px;color:#888}
</style>
</head>
<body>
<header>
<h1>MAMBA CLUB</h1>
<div class="subtitle">Luxury Progress Tracker V3.1</div>
</header>

<div id="stats"></div>

<div class="panel">
<h2>🏆 Top GOTM Winners</h2>
<div id="gotm"></div>
</div>

<div class="search-container">
<input id="search" placeholder="Search character..." onkeyup="filterPlayers()">
</div>

<div id="players"></div>

<footer>Mamba Club Progress Tracker</footer>

<script>
const CHARACTERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRFYYqQZ2iHw-U5tffIJDYOwSSdOdFgLsI1Voh_hRSId8OJ9Vkis2aY5UV-GOkDve67Q3AiStzsmbr3/pub?gid=0&single=true&output=csv";
const RANKS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRFYYqQZ2iHw-U5tffIJDYOwSSdOdFgLsI1Voh_hRSId8OJ9Vkis2aY5UV-GOkDve67Q3AiStzsmbr3/pub?gid=1115070164&single=true&output=csv";
let players=[],ranks=[];
const icons={Moissanite:"✨",Sapphire:"💙",Pearl:"🦪",Opal:"🔮",Diamond:"💎",Topaz:"🟨",Spinel:"⚫",Corundum:"🟥"};

function parseCSV(text){
 const rows=text.trim().split("\\n");
 const headers=rows[0].split(",").map(h=>h.trim());
 return rows.slice(1).map(row=>{
  const values=row.split(",");
  const obj={};
  headers.forEach((h,i)=>obj[h]=values[i]?.trim()||"");
  return obj;
 });
}

async function loadData(){
 const chars=await fetch(CHARACTERS_URL).then(r=>r.text());
 const rankText=await fetch(RANKS_URL).then(r=>r.text());
 players=parseCSV(chars);
 ranks=parseCSV(rankText);
 players.sort((a,b)=>Number(b.Points)-Number(a.Points));
 buildStats(); buildGotm(); render(players);
}

function buildStats(){
 document.getElementById("stats").innerHTML=`
 <div class="stat-card"><div>Members</div><div class="stat-number">${players.length}</div></div>
 <div class="stat-card"><div>Winter</div><div class="stat-number">${players.filter(p=>p.Faction==="Winter").length}</div></div>
 <div class="stat-card"><div>Ebony</div><div class="stat-number">${players.filter(p=>p.Faction==="Ebony").length}</div></div>
 <div class="stat-card"><div>Diamond</div><div class="stat-number">${players.filter(p=>Number(p.Points)>=100).length}</div></div>`;
}

function buildGotm(){
 const top=[...players].sort((a,b)=>Number(b["GOTM Awards"])-Number(a["GOTM Awards"])).slice(0,5);
 document.getElementById("gotm").innerHTML=top.map((p,i)=>`${i+1}. ${p.Name} (${p["GOTM Awards"]})`).join("<br>");
}

function getRankInfo(faction,points){
 points=Number(points);
 const fr=ranks.filter(r=>r.Faction===faction).sort((a,b)=>Number(a["Required Points"])-Number(b["Required Points"]));
 let current="Unranked",next=null,prev=0;
 for(const rank of fr){
  const req=Number(rank["Required Points"]);
  if(points>=req){current=rank.Rank;prev=req;} else {next=rank;break;}
 }
 return {current,next,prev};
}

function render(list){
 const c=document.getElementById("players"); c.innerHTML="";
 list.forEach(player=>{
  const info=getRankInfo(player.Faction,player.Points);
  let prog='';
  if(info.next){
   const cur=Number(player.Points), target=Number(info.next["Required Points"]);
   const pct=Math.max(0,Math.min(100,Math.round(((cur-info.prev)/(target-info.prev))*100)));
   prog=`<div><div class="label">Next Rank: ${info.next.Rank}</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><small>${cur}/${target} points</small></div>`;
  } else prog='<div class="max-rank">💎 Maximum Rank Achieved</div>';
  c.innerHTML += `<div class="card"><div class="name">${player.Name}</div><div><span class="label">Faction:</span> <span class="${player.Faction==="Winter"?"winter":"ebony"}">${player.Faction}</span></div><div><span class="label">Points:</span> ${player.Points}</div><div><span class="label">GOTM Awards:</span> ${player["GOTM Awards"]}</div><div><span class="label">Current Rank:</span> ${icons[info.current]||"🏅"} ${info.current}</div>${prog}</div>`;
 });
}

function filterPlayers(){
 const v=document.getElementById("search").value.toLowerCase();
 render(players.filter(p=>p.Name.toLowerCase().includes(v)));
}
loadData();
</script>
</body>
</html>
